<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — P.Clement</title>
  <script data-goatcounter="https://rickclmnt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <link rel="stylesheet" href="retro.css">
  <style>
    .project-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 80px);
    }

    /* Sidebar */
    .project-sidebar {
      border-right: 3px solid var(--brown);
      padding: 40px 28px;
      position: sticky;
      top: 80px;
      height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .sidebar-title {
      font-family: 'Fredoka One', Fredoka;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 20px;
    }
    .sidebar-list { list-style: none; }
    .sidebar-item {
      border-bottom: 2px solid var(--cream-dk);
    }
    .sidebar-link {
      display: block;
      padding: 12px 8px;
      font-family: 'Fredoka One', Fredoka;
      font-size: 0.9rem;
      color: var(--brown);
      text-decoration: none;
      opacity: 0.5;
      transition: all 0.2s;
    }
    .sidebar-link:hover, .sidebar-link.active {
      opacity: 1;
      color: var(--red);
    }
    .sidebar-link .stag {
      display: block;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.5;
      margin-top: 2px;
    }

    /* Main */
    .project-main { padding: 56px; }

    .project-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 8px;
    }
    #project-title {
      font-family: 'Fredoka One', Fredoka;
      font-size: clamp(2.5rem, 5vw, 5rem);
      line-height: 1;
      margin-bottom: 8px;
    }
    #project-date {
      font-size: 0.75rem;
      opacity: 0.45;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    #project-tag {
      display: inline-block;
      font-family: 'Fredoka One', Fredoka;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 40px;
    }
    #project-tag.prototype { background: var(--green); color: white; }
    #project-tag.concept   { background: var(--orange); color: white; }
    #project-tag.research  { background: var(--red); color: white; }

    .project-section {
      margin-bottom: 36px;
      padding-bottom: 36px;
      border-bottom: 2px solid var(--cream-dk);
    }
    .project-section:last-child { border-bottom: none; }
    .project-section h3 {
      font-family: 'Fredoka One', Fredoka;
      font-size: 1.2rem;
      margin-bottom: 12px;
      color: var(--brown);
    }
    .project-section p,
    .project-section li {
      font-size: 0.92rem;
      line-height: 1.9;
      opacity: 0.72;
    }
    .project-section ul { padding-left: 0; list-style: none; }
    .project-section li {
      padding: 6px 0 6px 20px;
      position: relative;
    }
    .project-section li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--red);
    }

    @media (max-width: 768px) {
      .project-layout { grid-template-columns: 1fr; }
      .project-sidebar { position: static; height: auto; border-right: none; border-bottom: 3px solid var(--brown); }
      .project-main { padding: 32px 20px; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">P.C</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
  </ul>
</nav>
<div class="stripe-bar"><div></div><div></div><div></div><div></div><div></div></div>

<div class="project-layout">
  <aside class="project-sidebar">
    <div class="sidebar-title">Projects</div>
    <ul class="sidebar-list" id="sidebarList"></ul>
  </aside>

  <main class="project-main reveal">
    <a href="timeline.html" class="back-btn" style="margin-bottom:32px;display:inline-flex;">← Archive</a>
    <div class="project-eyebrow">Project Detail</div>
    <h1 id="project-title"></h1>
    <div id="project-date"></div>
    <span id="project-tag"></span>

    <div class="project-section">
      <h3>Problem</h3>
      <p id="project-problem"></p>
    </div>
    <div class="project-section">
      <h3>What I Built</h3>
      <ul id="project-solution"></ul>
    </div>
    <div class="project-section">
      <h3>Result / Status</h3>
      <p id="project-result"></p>
    </div>
    <div class="project-section">
      <h3>Lessons Learned</h3>
      <p id="project-lessons"></p>
    </div>
  </main>
</div>

<div class="stripe-bar rev"><div></div><div></div><div></div><div></div><div></div></div>
<footer class="site-footer">
  <p>© 2026 Patrick Clement. All rights reserved.</p>
  <span class="footer-logo">P.C</span>
  <p>Software Engineer. Builder.</p>
</footer>

<script>
const projects = [
  { id:"rheingold", title:"Rheingold", date:"August 2022", tag:"Research — Trading Bot", tagClass:"research",
    problem:"I wanted to understand algorithmic trading and how automated systems could operate in volatile markets.",
    solution:["Developed a Python-based trading bot capable of executing trades using preset strategies.","Experimented with simple automation rules and basic market indicators."],
    result:"The prototype worked, but I shelved it after initial testing. It served more as a learning tool than a finished product.",
    lessons:"This project introduced me to the thrill of building systems for high-stakes environments and sparked my interest in automation." },
  { id:"pal", title:"PAL", date:"April 2024", tag:"Concept — AI Personality Module", tagClass:"concept",
    problem:"AI assistants felt bland and generic. I wanted to create one with personality, quirks, and depth.",
    solution:["Developed a prototype for a 'personality chip' that could sit on top of language models.","Designed early frameworks for memory, moods, and adaptive quirks."],
    result:"Prototype shelved, but inspired later projects like E3N and Firelike's Study Buddy.",
    lessons:"I learned that humanizing AI can create deeper connections, especially in education and companionship." },
  { id:"e3n", title:"E3N", date:"July 2024", tag:"Prototype — Adaptive Personality AI", tagClass:"prototype",
    problem:"I wanted to go further than PAL by creating an AI that doesn't just simulate personality but evolves with the user.",
    solution:["Built an adaptive memory system with slot-filling and evolving traits.","Experimented with modular 'agents' like MentorAgent and HumorAgent."],
    result:"Proof of concept completed; laid groundwork for my modular chatbot strategy.",
    lessons:"Showed me that modularity + adaptability is the future of human-computer interaction." },
  { id:"firelike", title:"Firelike", date:"September 2024 – Present", tag:"Prototype — Educational Platform", tagClass:"prototype",
    problem:"Schools in Nigeria lack subjects and tools that prepare students for the real world.",
    solution:["Designed a school management system with classroom, assignments, and parental monitoring.","Built 'Study Buddy,' an AI-powered tutor that integrates personality-driven learning.","Created a syllabus including STEM, world history, and practical life knowledge."],
    result:"Supposed to be in development but, if I'm being honest my heart is no longer in this project.",
    lessons:"Connecting education and technology in a truly beneficial manner to students is possible, but requires thoughtful design and careful implementation to actually work." }
];

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = projects.map(p => `
    <li class="sidebar-item">
      <a href="#${p.id}" class="sidebar-link" data-id="${p.id}">
        ${p.title}
        <span class="stag">${p.tagClass}</span>
      </a>
    </li>
  `).join('');
  document.querySelectorAll('.sidebar-link').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      history.pushState(null, '', '#' + link.dataset.id);
      loadProject(link.dataset.id);
    });
  });
}

function loadProject(id) {
  const p = projects.find(x=>x.id===id) || projects[0];
  document.getElementById('project-title').textContent = p.title;
  document.getElementById('project-date').textContent = p.date;
  const tag = document.getElementById('project-tag');
  tag.textContent = p.tag;
  tag.className = p.tagClass;
  document.getElementById('project-problem').textContent = p.problem;
  document.getElementById('project-solution').innerHTML = p.solution.map(s=>`<li>${s}</li>`).join('');
  document.getElementById('project-result').textContent = p.result;
  document.getElementById('project-lessons').textContent = p.lessons;
  document.querySelectorAll('.sidebar-link').forEach(l => {
    l.classList.toggle('active', l.dataset.id === p.id);
  });
  document.title = p.title + ' — P.Clement';
}

renderSidebar();
const hash = window.location.hash.replace('#','');
loadProject(hash || projects[0].id);
window.addEventListener('hashchange', () => loadProject(window.location.hash.replace('#','')));

const obs = new IntersectionObserver(entries => {
  entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'),i*80); });
}, {threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
