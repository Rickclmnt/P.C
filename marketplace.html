<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script data-goatcounter="https://rickclmnt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <title>Shop — P.Clement</title>
  <link rel="stylesheet" href="retro.css">
  <style>
    .shop-body { padding: 56px; }

    /* Filters */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 40px;
    }
    .filter-btn {
      font-family: 'Fredoka One', Fredoka;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      padding: 8px 20px;
      background: var(--cream-dk);
      color: var(--brown);
      border: 2px solid var(--brown);
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 3px 3px 0 var(--brown);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--brown);
      color: var(--cream);
    }

    /* Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0;
      border: 3px solid var(--brown);
    }

    .product-card {
      border-right: 3px solid var(--brown);
      border-bottom: 3px solid var(--brown);
      background: var(--cream);
      display: flex;
      flex-direction: column;
      transition: background 0.2s;
    }
    .product-card:hover { background: var(--cream-dk); }

    .product-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 3px solid var(--brown);
      display: block;
    }
    .product-img-placeholder {
      width: 100%;
      height: 180px;
      background: var(--cream-dk);
      border-bottom: 3px solid var(--brown);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .product-body { padding: 24px; flex:1; display:flex; flex-direction:column; }
    .product-cat {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 8px;
    }
    .product-title {
      font-family: 'Fredoka One', Fredoka;
      font-size: 1.2rem;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .product-desc {
      font-size: 0.8rem;
      line-height: 1.7;
      opacity: 0.65;
      flex:1;
      margin-bottom: 16px;
    }
    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 2px solid var(--cream-dk);
      padding-top: 16px;
    }
    .product-price {
      font-family: 'Fredoka One', Fredoka;
      font-size: 1.1rem;
    }
    .product-btn {
      font-family: 'Fredoka One', Fredoka;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 8px 18px;
      background: var(--brown);
      color: var(--cream);
      text-decoration: none;
      border: 2px solid var(--brown);
      border-radius: 100px;
      transition: all 0.2s;
      box-shadow: 2px 2px 0 var(--brown);
    }
    .product-btn:hover {
      background: var(--cream);
      color: var(--brown);
    }

    .empty-state {
      padding: 60px;
      text-align: center;
      border: 3px solid var(--brown);
      grid-column: 1/-1;
    }
    .empty-state p {
      font-family: 'Fredoka One', Fredoka;
      font-size: 1.3rem;
      opacity: 0.4;
    }

    @media (max-width: 768px) {
      .shop-body { padding: 32px 20px; }
      .products-grid { grid-template-columns: 1fr; }
      .product-card { border-right: 3px solid var(--brown); }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">P.C</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
  </ul>
</nav>
<div class="stripe-bar"><div></div><div></div><div></div><div></div><div></div></div>

<div class="page-header reveal">
  <p class="page-eyebrow">05 — Commerce</p>
  <h1 class="page-title retro-shadow-sm">My<br>Shop</h1>
  <p class="page-subtitle">Projects, tools, and weird tech things — available for you to use.</p>
</div>

<div class="shop-body">
  <div class="filters reveal" id="filters"></div>
  <div class="products-grid" id="productGrid"></div>
</div>

<div class="stripe-bar rev"><div></div><div></div><div></div><div></div><div></div></div>
<footer class="site-footer">
  <p>© 2026 Patrick Clement. All rights reserved.</p>
  <span class="footer-logo">P.C</span>
  <p>Software Engineer. Builder.</p>
</footer>

<script>
async function loadProducts() {
  const grid = document.getElementById('productGrid');
  const filtersEl = document.getElementById('filters');

  let products = [];
  try {
    const res = await fetch('products.json');
    products = await res.json();
  } catch(e) {
    grid.innerHTML = '<div class="empty-state"><p>Shop coming soon ✦</p></div>';
    return;
  }

  if (!products.length) {
    grid.innerHTML = '<div class="empty-state"><p>Shop coming soon ✦</p></div>';
    return;
  }

  const categories = ['All', ...new Set(products.map(p => p.category))];
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = cat;
    btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(cat === 'All' ? products : products.filter(p => p.category === cat));
    };
    filtersEl.appendChild(btn);
  });

  function getLabel(t) {
    return {download:'Download',buy:'Buy Now',demo:'Try Demo',enroll:'Enroll',hire:'Hire Me'}[t] || 'View';
  }

  function render(items) {
    grid.innerHTML = items.map(p => `
      <div class="product-card">
        ${p.image ? `<img class="product-img" src="${p.image}" alt="${p.title}">` : `<div class="product-img-placeholder">📦</div>`}
        <div class="product-body">
          <div class="product-cat">${p.category || ''}</div>
          <div class="product-title">${p.title}</div>
          <p class="product-desc">${p.description}</p>
          <div class="product-footer">
            <span class="product-price">${p.price}</span>
            <a href="${p.link}" target="_blank" class="product-btn">${getLabel(p.actionType || p.button)}</a>
          </div>
        </div>
      </div>
    `).join('');
  }

  render(products);
}

loadProducts();

const obs = new IntersectionObserver(entries => {
  entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'),i*80); });
}, {threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
