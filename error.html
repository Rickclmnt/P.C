<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script data-goatcounter="https://rickclmnt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <title>Not Available — P.Clement</title>
  <link rel="stylesheet" href="retro.css">
  <style>
    .error-page {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px;
    }
    .error-box {
      border: 3px solid var(--brown);
      box-shadow: 8px 8px 0 var(--brown);
      padding: 64px 56px;
      text-align: center;
      max-width: 520px;
      position: relative;
      overflow: hidden;
    }
    .error-box::before {
      content:'';
      position:absolute;
      top:0;left:0;right:0;
      height:8px;
      background: linear-gradient(to right, var(--blue) 20%, var(--red) 20%, var(--red) 40%, var(--orange) 40%, var(--orange) 60%, var(--green) 60%, var(--green) 80%, var(--yellow) 80%);
    }
    .error-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    .error-code {
      font-family: 'Fredoka One', Fredoka;
      font-size: 6rem;
      line-height: 1;
      color: var(--cream);
      -webkit-text-stroke: 2px var(--brown);
      text-shadow:
        3px 3px 0 var(--red),
        4px 4px 0 var(--brown),
        6px 6px 0 var(--orange),
        7px 7px 0 var(--brown);
      margin-bottom: 16px;
    }
    .error-title {
      font-family: 'Fredoka One', Fredoka;
      font-size: 1.8rem;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 0.9rem;
      opacity: 0.6;
      line-height: 1.8;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">P.C</a>
</nav>
<div class="stripe-bar"><div></div><div></div><div></div><div></div><div></div></div>

<div class="error-page">
  <div class="error-box reveal">
    <div class="error-icon"></div>
    <div class="error-code">404</div>
    <div class="error-title">Not Available</div>
    <p class="error-desc">This product or service isn't available yet.<br>Check back soon — things are always being built.</p>
    <a href="index.html" class="cta-btn">← Back Home</a>
  </div>
</div>

<div class="stripe-bar rev"><div></div><div></div><div></div><div></div><div></div></div>
<footer class="site-footer">
  <p>© 2026 Patrick Clement. All rights reserved.</p>
  <span class="footer-logo">P.C</span>
  <p>Software Engineer. Builder.</p>
</footer>

<script>
  const obs = new IntersectionObserver(entries => {
    entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'),i*80); });
  }, {threshold:0.1});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
