<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook — P.Clement</title>
  <script data-goatcounter="https://rickclmnt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <link rel="stylesheet" href="retro.css">
  <style>
    .notebook-body { padding: 56px; }

    /* Search */
    .search-wrap {
      display: flex;
      max-width: 480px;
      margin-bottom: 48px;
    }
    .search-wrap input {
      flex: 1;
      padding: 14px 18px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.95rem;
      background: var(--cream);
      border: 3px solid var(--brown);
      border-right: none;
      outline: none;
      color: var(--brown);
    }
    .search-wrap input::placeholder { opacity: 0.4; }
    .search-wrap button {
      padding: 14px 24px;
      background: var(--brown);
      color: var(--cream);
      font-family: 'Fredoka One', Fredoka;
      font-size: 0.9rem;
      border: 3px solid var(--brown);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .search-wrap button:hover { background: var(--red); border-color: var(--red); }

    /* Grid */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0;
      border: 3px solid var(--brown);
    }

    .note-card {
      padding: 40px 36px;
      border-right: 3px solid var(--brown);
      border-bottom: 3px solid var(--brown);
      text-decoration: none;
      color: var(--brown);
      display: block;
      background: var(--cream);
      transition: background 0.25s;
      position: relative;
      overflow: hidden;
    }
    .note-card:nth-child(3n) { border-right: none; }
    .note-card:hover { background: var(--brown); color: var(--cream); }
    .note-card:hover .note-title,
    .note-card:hover .note-desc { color: var(--cream); }
    .note-card:hover .note-tag { color: var(--yellow); }
    .note-card:hover .note-arrow { opacity: 1; color: var(--cream); transform: translate(3px,-3px); }
    .note-card::before {
      content:'';
      position:absolute;
      top:0; left:0; right:0;
      height:5px;
      background: linear-gradient(to right, var(--blue) 20%, var(--red) 20%, var(--red) 40%, var(--orange) 40%, var(--orange) 60%, var(--green) 60%, var(--green) 80%, var(--yellow) 80%);
      opacity:0;
      transition: opacity 0.25s;
    }
    .note-card:hover::before { opacity:1; }

    .note-num {
      font-family: 'Fredoka One', Fredoka;
      font-size: 4rem;
      color: var(--cream-dk);
      line-height: 1;
      margin-bottom: 12px;
      user-select: none;
      transition: color 0.25s;
    }
    .note-card:hover .note-num { color: rgba(255,255,255,0.1); }

    .note-tag {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 10px;
      transition: color 0.25s;
    }
    .note-title {
      font-family: 'Fredoka One', Fredoka;
      font-size: 1.5rem;
      line-height: 1.15;
      margin-bottom: 12px;
      transition: color 0.25s;
    }
    .note-desc {
      font-size: 0.82rem;
      line-height: 1.8;
      opacity: 0.65;
      transition: color 0.25s;
    }
    .note-arrow {
      position: absolute;
      top: 32px; right: 32px;
      font-size: 1.2rem;
      opacity: 0.25;
      transition: all 0.25s;
    }

    .no-results {
      padding: 40px;
      font-family: 'Fredoka One', Fredoka;
      font-size: 1.2rem;
      opacity: 0.5;
      border: 3px solid var(--brown);
    }

    @media (max-width: 768px) {
      .notebook-body { padding: 32px 20px; }
      .notes-grid { grid-template-columns: 1fr; }
      .note-card:nth-child(3n) { border-right: 3px solid var(--brown); }
      .note-card:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">P.C</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
  </ul>
</nav>
<div class="stripe-bar"><div></div><div></div><div></div><div></div><div></div></div>

<div class="page-header reveal">
  <p class="page-eyebrow">02 — Writing</p>
  <h1 class="page-title retro-shadow-sm">My<br>Notebook</h1>
  <p class="page-subtitle">Essays, thoughts, reflections. A digital notebook — raw and unfiltered.</p>
</div>

<div class="notebook-body">
  <div class="search-wrap reveal">
    <input type="text" id="searchInput" placeholder="Search notes...">
    <button onclick="searchNotes()">Search</button>
  </div>

  <div class="notes-grid" id="notesGrid"></div>
</div>

<div class="stripe-bar rev"><div></div><div></div><div></div><div></div><div></div></div>
<footer class="site-footer">
  <p>© 2026 Patrick Clement. All rights reserved.</p>
  <span class="footer-logo">P.C</span>
  <p>Software Engineer. Builder.</p>
</footer>

<script>
const notes = [
  {
    title: "A.E.T.H.E.R. Project Overview 🧠",
    desc: "Adaptive Engine for Thought Hierarchies and Evolving Reasoning.",
    tag: "AI Research",
    link: "Aether overview.html"
  },
  {
    title: "CABSim 👾",
    desc: "Agent-based modeling for forecasting daily work patterns and productivity.",
    tag: "Simulation",
    link: "CABSim.html"
  },
  {
    title: '"Tool-First, Friend-Later"',
    desc: "A rant about conversational AI — and how to fix it.",
    tag: "Essay",
    link: "AI rant.html"
  }
];

let filtered = [...notes];

function render(list) {
  const grid = document.getElementById('notesGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">No notes found.</div>';
    return;
  }
  grid.innerHTML = list.map((n,i) => `
    <a href="${n.link}" class="note-card reveal">
      <div class="note-num">0${i+1}</div>
      <div class="note-tag">${n.tag}</div>
      <div class="note-title">${n.title}</div>
      <p class="note-desc">${n.desc}</p>
      <span class="note-arrow">↗</span>
    </a>
  `).join('');
  observeNew();
}

function searchNotes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = notes.filter(n => n.title.toLowerCase().includes(q) || n.desc.toLowerCase().includes(q));
  render(filtered);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchNotes();
});

function observeNew() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'),i*80); });
  }, {threshold:0.1});
  document.querySelectorAll('.reveal:not(.visible)').forEach(el=>obs.observe(el));
}

render(notes);

const obs = new IntersectionObserver(entries => {
  entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'),i*80); });
}, {threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
